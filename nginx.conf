worker_processes auto;
events {
    worker_connections 1024;
}
http {
    include       /etc/nginx/mime.types;
    default_type text/html;
    sendfile      on;
    keepalive_timeout 65;

    # Apex marketing site
    server {
        listen 8080;
        server_name sheriffcloud.com www.sheriffcloud.com;
        root /app/dist;
        index index.html;
        port_in_redirect off;
        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }
    }

    # Admin app
    server {
        listen 8080;
        server_name admin.sheriffcloud.com;
        root /app/dist/admin;
        index index.html;
        location /api/ {
            proxy_pass http://127.0.0.1:9000;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }
    }

    # Chatterbox
    server {
        listen 8080;
        server_name chatterbox.sheriffcloud.com;
        root /app/dist/chatterbox;
        index index.html;
        port_in_redirect off;
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Spur (admin app, not portal sites)
    server {
        listen 8080;
        server_name spur.sheriffcloud.com;
        root /app/dist/spur;
        index index.html;
        port_in_redirect off;
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Holster
    server {
        listen 8080;
        server_name holster.sheriffcloud.com;
        root /app/dist/holster;
        index index.html;
        port_in_redirect off;
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Portal sites — served from dist/site (React SPA)
    server {
        listen 8080;
        server_name ~^(?<sub>[^.]+)\.sheriffcloud\.com$;
        root /app/dist/site;
        index index.html;
        port_in_redirect off;

        gzip on;
        gzip_types text/plain text/css application/javascript application/json image/svg+xml application/rss+xml;
        gzip_min_length 1024;

        resolver 1.1.1.1 valid=60s;

        # RSS feed — proxy to edge function
        location = /rss {
            rewrite ^ /functions/v1/rss_feed break;
            proxy_pass https://ukyjfstfoaybvzwplrwx.supabase.co;
            proxy_set_header Host ukyjfstfoaybvzwplrwx.supabase.co;
            proxy_set_header X-Subdomain $sub;
            proxy_set_header Authorization "Bearer sb_publishable_rscjPXRJKAm8ZSTRXr_wZw_-umwFzDD";
            proxy_set_header apikey "sb_publishable_rscjPXRJKAm8ZSTRXr_wZw_-umwFzDD";
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_read_timeout 10s;
        }

        # Long-cache for hashed assets
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}