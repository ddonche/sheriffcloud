worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  text/html;
    sendfile      on;
    keepalive_timeout 65;

    map $http_user_agent $is_crawler {
        default                         0;
        ~*facebookexternalhit           1;
        ~*Twitterbot                    1;
        ~*LinkedInBot                   1;
        ~*Slackbot                      1;
        ~*TelegramBot                   1;
        ~*WhatsApp                      1;
        ~*Discordbot                    1;
        ~*Googlebot                     1;
        ~*bingbot                       1;
        ~*iframely                      1;
        ~*Embedly                       1;
    }

    # Chatterbox
    server {
        listen 8080;
        server_name chatterbox.sheriffcloud.com;
        root /app/dist/chatterbox;
        index index.html;
        port_in_redirect off;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Holster
    server {
        listen 8080;
        server_name holster.sheriffcloud.com;
        root /app/dist/holster;
        index index.html;
        port_in_redirect off;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Admin
    server {
        listen 8080;
        server_name admin.sheriffcloud.com;
        root /app/dist;
        index index.html;
        port_in_redirect off;

        location /api/upload_portal {
            proxy_pass http://127.0.0.1:9001;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 512m;
            proxy_read_timeout 120s;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:9000;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }
    }

    # Published Sheriff portal sites on sheriffcloud.com — served from R2
    server {
        listen 8080;
        server_name ~^(?<sub>[^.]+)\.sheriffcloud\.com$;
        port_in_redirect off;

        resolver 1.1.1.1 valid=60s;

        gzip on;
        gzip_types text/plain text/css application/javascript application/json image/svg+xml application/rss+xml;
        gzip_min_length 1024;

        location / {
            set $r2_uri $request_uri;
            if ($request_uri = /) {
                set $r2_uri /index.html;
            }
            if ($request_uri ~* /$) {
                set $r2_uri ${request_uri}index.html;
            }
            proxy_pass https://pub-c138e687ccc24326bc40dfde3fb53a90.r2.dev/dist/$sub$r2_uri;
            proxy_set_header Host pub-c138e687ccc24326bc40dfde3fb53a90.r2.dev;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
        }
    }

    # Unified app bundle: Sheriff front, Spur front
    server {
        listen 8080;
        server_name
            sheriffcloud.com
            www.sheriffcloud.com
            spur.sheriffcloud.com
            spur.ink
            www.spur.ink;

        root /app/dist;
        index index.html;
        port_in_redirect off;

        location /api/upload_portal {
            proxy_pass http://127.0.0.1:9001;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 512m;
            proxy_read_timeout 120s;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:9000;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }
    }

    # Published Spur blog sites on spur.ink
    server {
        listen 8080;
        server_name ~^(?<sub>[^.]+)\.spur\.ink$;
        root /app/dist;
        index index.html;
        port_in_redirect off;

        gzip on;
        gzip_types text/plain text/css application/javascript application/json image/svg+xml application/rss+xml;
        gzip_min_length 1024;

        resolver 1.1.1.1 valid=60s;

        location = /rss {
            rewrite ^ /functions/v1/rss_feed break;
            proxy_pass https://ukyjfstfoaybvzwplrwx.supabase.co;
            proxy_set_header Host ukyjfstfoaybvzwplrwx.supabase.co;
            proxy_set_header X-Subdomain $sub;
            proxy_set_header Authorization "Bearer sb_publishable_rscjPXRJKAm8ZSTRXr_wZw_-umwFzDD";
            proxy_set_header apikey "sb_publishable_rscjPXRJKAm8ZSTRXr_wZw_-umwFzDD";
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_read_timeout 10s;
        }

        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~ ^/blog/(.+)$ {
            if ($is_crawler) {
                proxy_pass http://127.0.0.1:9001/og/$sub$request_uri;
                break;
            }
            try_files $uri $uri/ /index.html;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
