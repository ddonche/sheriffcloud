worker_processes auto;
events {
    worker_connections 1024;
}
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Apex marketing site + Rodeo AI
    server {
        listen 8080;
        server_name sheriffcloud.com www.sheriffcloud.com;
        root /app/dist;
        index index.html;

        # Rodeo AI — standalone app served at /rodeo/
        # Builds to /app/dist/rodeo via rodeo-src
        location ^~ /rodeo/ {
            alias /app/dist/rodeo/;
            try_files $uri $uri/ /rodeo/index.html;
        }
        # Redirect bare /rodeo to /rodeo/
        location = /rodeo {
            return 301 https://sheriffcloud.com/rodeo/;
        }

        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }
    }

    # Admin app
    server {
        listen 8080;
        server_name admin.sheriffcloud.com;
        root /app/dist/admin;
        index index.html;
        location /api/ {
            proxy_pass http://127.0.0.1:9000;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }
    }

    # Portal sites
    server {
        listen 8080;
        server_name ~^(?<sub>[^.]+)\.sheriffcloud\.com$;
        resolver 1.1.1.1 valid=60s;

        location / {
            set $r2_path "/dist/$sub$uri";
            if ($uri ~ "/$") {
                set $r2_path "/dist/$sub${uri}index.html";
            }
            proxy_pass https://pub-c138e687ccc24326bc40dfde3fb53a90.r2.dev$r2_path;
            proxy_set_header Host pub-c138e687ccc24326bc40dfde3fb53a90.r2.dev;
            proxy_ssl_server_name on;
        }
    }
}