# ── Portal sites (goblin.sheriffcloud.com, etc.) ─────────────────
# Replaces the old proxy_pass to site_router edge function.
# React SPA served from dist/site — all paths → index.html
server {
    listen 8080;
    server_name ~^(?<sub>[^.]+)\.sheriffcloud\.com$;

    root /app/dist/site;
    index index.html;

    port_in_redirect off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-cache for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — everything else → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
